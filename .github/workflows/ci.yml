name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript and vectors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm clean
      - run: pnpm build
      - run: pnpm -r --if-present typecheck
      - run: pnpm -r --if-present test
      - run: pnpm audit --audit-level=moderate

  solidity:
    name: Solidity and invariants
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
        with:
          version: v1.7.1
      - name: Install forge-std
        if: hashFiles('contracts/lib/forge-std/src/Test.sol') == ''
        run: cd contracts && forge install foundry-rs/forge-std@v1.16.2 --no-git
      - run: cd contracts && forge fmt --check
      - run: cd contracts && forge test
