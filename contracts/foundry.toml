[profile.default]
src = "src"
test = "test"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
# No external libraries: the reference contracts are dependency-free
# (EIP-712 / ECDSA implemented inline) so the suite builds offline.

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
